<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taco Cloud | Order Details</title>
    <link rel="stylesheet" th:href="@{/styles/orders.css}" />
  </head>
  <body>
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <div class="container">
      <div class="header">
        <h1>Order your taco creations!</h1>
      </div>

      <div class="image-wrapper">
        <img th:src="@{/images/sandwich_cartoon.jpg}" alt="Taco Logo" />
      </div>

      <div class="order-summary">
        <h3>Your tacos in this order:</h3>
        <ul>
          <li th:each="taco : ${tacoOrder.tacos}">
            <span th:text="${taco.name}">taco name</span>
          </li>
        </ul>
        <a th:href="@{/design}" class="design-link">Add another taco</a>
      </div>

      <form method="POST" th:action="@{/orders}" th:object="${tacoOrder}">
        <div class="form-section">
          <h3>Deliver my taco masterpieces to...</h3>
          <div class="form-group">
            <label for="deliveryName">Name</label>
            <input type="text" th:field="*{deliveryName}" placeholder="Your full name" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('deliveryName')}"
                  th:errors="*{deliveryName}">Name Error</span>
          </div>
          <div class="form-group">
            <label for="deliveryStreet">Street address</label>
            <input type="text" th:field="*{deliveryStreet}" placeholder="Street and house number" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('deliveryStreet')}"
                  th:errors="*{deliveryStreet}">Street Error</span>
          </div>
          <div class="form-group">
            <label for="deliveryCity">City</label>
            <input type="text" th:field="*{deliveryCity}" placeholder="City" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('deliveryCity')}"
                  th:errors="*{deliveryCity}">City Error</span>
          </div>
          <div class="form-group">
            <label for="deliveryState">State</label>
            <input type="text" th:field="*{deliveryState}" placeholder="State" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('deliveryState')}"
                  th:errors="*{deliveryState}">State Error</span>
          </div>
          <div class="form-group">
            <label for="deliveryZip">Zip code</label>
            <input type="text" th:field="*{deliveryZip}" placeholder="Zip code" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('deliveryZip')}"
                  th:errors="*{deliveryZip}">Zip Error</span>
          </div>
        </div>

        <div class="form-section">
          <h3>Here's how I'll pay...</h3>
          <div class="form-group">
            <label for="ccNumber">Credit Card #</label>
            <input type="text" th:field="*{ccNumber}" placeholder="0000 0000 0000 0000" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('ccNumber')}"
                  th:errors="*{ccNumber}">CC Num Error</span>
          </div>
          <div class="form-group">
            <label for="ccExpiration">Expiration</label>
            <input type="text" th:field="*{ccExpiration}" placeholder="MM/YY" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('ccExpiration')}"
                  th:errors="*{ccExpiration}">CC Exp Error</span>
          </div>
          <div class="form-group">
            <label for="ccCVV">CVV</label>
            <input type="text" th:field="*{ccCVV}" placeholder="123" />
            <span class="validationError"
                  th:if="${#fields.hasErrors('ccCVV')}"
                  th:errors="*{ccCVV}">CC CVV Error</span>
          </div>
        </div>

        <button type="submit" class="submit-btn">Submit Order</button>
      </form>
    </div>
  </body>
</html>
