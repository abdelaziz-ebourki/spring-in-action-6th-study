<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/styles/home.css}" />
    <title>Taco Cloud | Modern Flavors</title>
  </head>
  <body>
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <div class="container">
      <div class="header">
        <h1>Taco Cloud</h1>
      </div>
      <div class="main">
        <p>Welcome to the Future of Flavors.</p>
        <p>Hand-crafted tacos, redefined with Spring Boot & Thymeleaf.</p>
        <div class="image-wrapper">
          <img th:src="@{/images/sandwich_cartoon.jpg}" alt="Sandwich" />
        </div>
        <div class="action-area">
          <a th:href="@{/design}" class="design-link">Design your taco</a>
        </div>
      </div>
    </div>
  </body>
</html>
