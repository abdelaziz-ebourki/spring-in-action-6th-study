<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taco Cloud | Modern Flavors</title>
    <style>
      :root {
        --bg-color: #020617;
        --card-bg: rgba(30, 41, 59, 0.4);
        --text-color: #f8fafc;
        --accent-color: #f97316;
        --accent-glow: 0 0 15px rgba(249, 115, 22, 0.6);
        --glass-border: 1px solid rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: radial-gradient(circle at center, #0f172a, var(--bg-color));
        color: var(--text-color);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .container {
        max-width: 500px;
        width: 90%;
        padding: 40px;
        background: var(--card-bg);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: var(--glass-border);
        border-radius: 24px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        text-align: center;
        transition:
          transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          box-shadow 0.4s ease;
      }

      .container:hover {
        transform: scale(1.02);
        box-shadow: 0 12px 48px 0 rgba(249, 115, 22, 0.2);
        border-color: rgba(249, 115, 22, 0.3);
      }

      .header h1 {
        font-size: 3rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-bottom: 20px;
        color: var(--accent-color);
        text-shadow: var(--accent-glow);
      }

      .main p {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 15px;
        opacity: 0.9;
      }

      .image-wrapper {
        position: relative;
        display: inline-block;
        margin: 30px 0;
      }

      .image-wrapper::after {
        content: "";
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border: 2px solid var(--accent-color);
        border-radius: 50%;
        box-shadow: var(--accent-glow);
        animation: pulse 2s infinite ease-in-out;
      }

      .main img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
      }

      /* Subtle background glow elements */
      .glow-blob {
        position: absolute;
        width: 300px;
        height: 300px;
        background: var(--accent-color);
        filter: blur(120px);
        opacity: 0.1;
        z-index: -1;
      }
      .blob-1 {
        top: 10%;
        left: 10%;
      }
      .blob-2 {
        bottom: 10%;
        right: 10%;
      }
    </style>
  </head>
  <body>
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <div class="container">
      <div class="header">
        <h1>Taco Cloud</h1>
      </div>
      <div class="main">
        <p>Welcome to the Future of Flavors.</p>
        <p>Hand-crafted tacos, redefined with Spring Boot & Thymeleaf.</p>
        <div class="image-wrapper">
          <img th:src="@{/images/sandwich_cartoon.jpg}" alt="Sandwich" />
        </div>
      </div>
    </div>
  </body>
</html>
