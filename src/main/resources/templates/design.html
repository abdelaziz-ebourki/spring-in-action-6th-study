<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/styles/design.css}" />
    <title>Taco Cloud | Design Your Creation</title>
  </head>
  <body>
    <div class="glow-blob blob-1"></div>
    <div class="glow-blob blob-2"></div>

    <div class="container">
      <div class="header">
        <h1>Design your taco!</h1>
      </div>

      <div class="image-wrapper">
        <img th:src="@{/images/sandwich_cartoon.jpg}" alt="Taco Logo" />
      </div>

      <form method="POST" th:object="${taco}">
        <div class="grid">
          <div class="ingredient-group" id="wraps">
            <h3>Designate your wrap:</h3>
            <div th:each="ingredient : ${wrap}" class="ingredient-item">
              <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}" />
              <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
          </div>

          <div class="ingredient-group" id="proteins">
            <h3>Pick your protein:</h3>
            <div th:each="ingredient : ${protein}" class="ingredient-item">
              <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}" />
              <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
          </div>

          <div class="ingredient-group" id="cheeses">
            <h3>Choose your cheese:</h3>
            <div th:each="ingredient : ${cheese}" class="ingredient-item">
              <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}" />
              <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
          </div>

          <div class="ingredient-group" id="veggies">
            <h3>Determine your veggies:</h3>
            <div th:each="ingredient : ${veggies}" class="ingredient-item">
              <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}" />
              <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
          </div>

          <div class="ingredient-group" id="sauces">
            <h3>Select your sauce:</h3>
            <div th:each="ingredient : ${sauce}" class="ingredient-item">
              <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}" />
              <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
          </div>
        </div>

        <span class="validationError"
              th:if="${#fields.hasErrors('ingredients')}"
              th:errors="*{ingredients}">Ingredient Error</span>

        <div class="submission-area">
          <h3>Name your taco creation:</h3>
          <input type="text" th:field="*{name}" placeholder="Enter taco name..." />
          <span class="validationError"
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}">Name Error</span>
          <br />
          <button type="submit">Submit Your Taco</button>
        </div>
      </form>
    </div>
  </body>
</html>
